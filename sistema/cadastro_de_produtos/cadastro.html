<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Sistema Python PowerUp</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .container {
            max-width: 550px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Formulário de Cadastro de Produtos</h1>
        </div>
        <form id="cadastroForm">
            <div class="form-group">
                <label for="codigo">Código do Produto</label>
                <input type="text" id="codigo" name="codigo" class="form-control" placeholder="Código do produto">
            </div>
            <div class="form-group">
                <label for="marca">Marca do Produto</label>
                <input type="text" id="marca" name="marca" class="form-control" placeholder="Marca do Produto">
            </div>
            <div class="form-group">
                <label for="tipo">Tipo do Produto</label>
                <input type="text" id="tipo" name="tipo" class="form-control" placeholder="Tipo do Produto">
            </div>
            <div class="form-group">
                <label for="categoria">Categoria do Produto</label>
                <input type="text" id="categoria" name="categoria" class="form-control" placeholder="Categoria do Produto">
            </div>
            <div class="form-group">
                <label for="preco">Preço Unitário do Produto</label>
                <input type="text" id="preco" name="preco" class="form-control" placeholder="Preço Unitário do Produto">
            </div>
            <div class="form-group">
                <label for="custo">Custo do Produto</label>
                <input type="text" id="custo" name="custo" class="form-control" placeholder="Custo do Produto">
            </div>
            <div class="form-group">
                <label for="obs">OBS</label>
                <input type="text" id="obs" name="obs" class="form-control" placeholder="Observações">
            </div>
            
            <div class="btn-group">
                <button type="button" id="btn-enviar" class="btn btn-primary" onclick="limpar()">Enviar</button>
                <button type="button" id="btn-limpar" class="btn btn-secondary" onclick="limpar()">Limpar</button>
            </div>
        </form>
    </div>

    <script>
        function limpar() {
            // Limpa o formulário
            document.getElementById('cadastroForm').reset();
            // Foca no primeiro campo após limpar para facilitar a próxima execução do RPA
            document.getElementById('codigo').focus();
        }

        // Previne o envio padrão do form se apertar Enter
        document.getElementById('cadastroForm').addEventListener('submit', function(e) {
            e.preventDefault();
            limpar();
        });
    </script>
</body>
</html>
