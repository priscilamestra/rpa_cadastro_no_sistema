<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema Python PowerUp</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Centraliza perfeitamente a página de login que é menor */
        body { align-items: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Sistema Python PowerUp</h1>
            <p>Faça seu Login para acessar</p>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="Seu e-mail de login" required>
            </div>
            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" class="form-control" placeholder="Sua senha" required>
            </div>
            <div class="btn-group">
                <button type="button" id="btn-logar" class="btn btn-primary" onclick="fazerLogin()">Logar</button>
            </div>
        </form>
    </div>

    <script>
        function fazerLogin() {
            // Qualquer dado inserido irá redirecionar para a página de cadastro
            window.location.href = 'cadastro.html';
        }

        // Permite logar apertando Enter
        document.getElementById('senha').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                fazerLogin();
            }
        });
    </script>
</body>
</html>
